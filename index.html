<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Translator</title>
    <!-- Tailwind CSS for Professional UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for Sleek Modern Look -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between text-slate-800">

    <!-- Navbar -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-xl">
                <i data-lucide="languages" class="w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">PolyGlot AI</h1>
        </div>
        <span class="text-xs bg-emerald-100 text-emerald-800 font-medium px-2.5 py-1 rounded-full flex items-center gap-1">
            <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span> Live Translation Active
        </span>
    </header>

    <!-- Main Workspace -->
    <main class="max-w-6xl w-full mx-auto p-4 md:p-8 flex-grow flex flex-col justify-center">
        <div class="bg-white rounded-2xl border border-slate-200 shadow-xl overflow-hidden grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-slate-200">
            
            <!-- SOURCE SIDE -->
            <div class="p-6 flex flex-col justify-between min-h-[320px]">
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <select id="source-lang" class="bg-slate-100 font-medium border-0 text-slate-700 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 p-2.5 outline-none cursor-pointer">
                            <option value="en-GB">English</option>
                            <option value="hi-IN">Hindi (हिंदी)</option>
                            <option value="es-ES">Spanish (Español)</option>
                            <option value="fr-FR">French (Français)</option>
                            <option value="de-DE">German (Deutsch)</option>
                        </select>
                        <span id="char-count" class="text-xs text-slate-400 font-medium">0 / 5000</span>
                    </div>
                    <textarea id="source-text" maxlength="5000" placeholder="Type or paste your text here..." class="w-full h-48 border-0 resize-none text-lg text-slate-700 placeholder-slate-400 focus:ring-0 outline-none"></textarea>
                </div>
                <div class="flex justify-between items-center pt-4 border-t border-slate-100">
                    <button id="speak-source" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all duration-200 flex items-center gap-1.5 text-sm font-medium">
                        <i data-lucide="volume-2" class="w-4 h-4"></i> Listen
                    </button>
                    <button id="clear-btn" class="text-xs font-semibold text-rose-500 hover:text-rose-600 transition-colors">Clear Text</button>
                </div>
            </div>

            <!-- TARGET SIDE -->
            <div class="p-6 bg-slate-50/50 flex flex-col justify-between min-h-[320px]">
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <select id="target-lang" class="bg-slate-100 font-medium border-0 text-slate-700 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 p-2.5 outline-none cursor-pointer">
                            <option value="hi-IN">Hindi (हिंदी)</option>
                            <option value="en-GB">English</option>
                            <option value="es-ES">Spanish (Español)</option>
                            <option value="fr-FR">French (Français)</option>
                            <option value="de-DE">German (Deutsch)</option>
                        </select>
                    </div>
                    <textarea id="target-text" placeholder="Translation will display here..." readonly class="w-full h-48 border-0 bg-transparent resize-none text-lg font-medium text-blue-900 placeholder-slate-400 focus:ring-0 outline-none"></textarea>
                </div>
                <div class="flex justify-start gap-3 pt-4 border-t border-slate-100">
                    <button id="copy-target" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all duration-200 flex items-center gap-1.5 text-sm font-medium">
                        <i data-lucide="copy" class="w-4 h-4"></i> <span id="copy-text">Copy</span>
                    </button>
                    <button id="speak-target" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all duration-200 flex items-center gap-1.5 text-sm font-medium">
                        <i data-lucide="volume-2" class="w-4 h-4"></i> Listen
                    </button>
                </div>
            </div>

        </div>

        <!-- Action Button -->
        <div class="mt-6 flex justify-center">
            <button id="translate-btn" class="w-full md:w-auto bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold px-12 py-4 rounded-xl shadow-lg shadow-blue-500/20 hover:shadow-xl hover:shadow-blue-500/30 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 flex items-center justify-center gap-2 text-base">
                <i data-lucide="sparkles" class="w-5 h-5"></i> Translate Document
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-4 text-xs text-slate-400 font-medium border-t border-slate-200 bg-white">
        PolyGlot AI • High-Performance Language Engine
    </footer>

    <!-- Logic Engine -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // DOM Elements
        const sourceText = document.getElementById('source-text');
        const targetText = document.getElementById('target-text');
        const sourceLang = document.getElementById('source-lang');
        const targetLang = document.getElementById('target-lang');
        const translateBtn = document.getElementById('translate-btn');
        const copyBtn = document.getElementById('copy-target');
        const copyText = document.getElementById('copy-text');
        const speakSourceBtn = document.getElementById('speak-source');
        const speakTargetBtn = document.getElementById('speak-target');
        const charCount = document.getElementById('char-count');
        const clearBtn = document.getElementById('clear-btn');

        // Real-time character counting
        sourceText.addEventListener('input', () => {
            charCount.textContent = `${sourceText.value.length} / 5000`;
        });

        // Clear Functionality
        clearBtn.addEventListener('click', () => {
            sourceText.value = '';
            targetText.value = '';
            charCount.textContent = '0 / 5000';
        });

        // High-Performance Translation Handler
        translateBtn.addEventListener('click', async () => {
            const text = sourceText.value.trim();
            if (!text) return;

            // UI Feedback State
            translateBtn.disabled = true;
            translateBtn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...`;
            targetText.placeholder = "AI Engine is analyzing & translating...";
            
            const from = sourceLang.value;
            const to = targetLang.value;
            const apiUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Network response failure.');
                const data = await response.json();
                
                if (data.responseData) {
                    targetText.value = data.responseData.translatedText;
                } else {
                    targetText.value = "🎯 Translation Error: API quota limits or service error.";
                }
            } catch (error) {
                console.error("API Integration Failure:", error);
                targetText.value = "⚠️ Connection Timeout. Please check your internet connectivity.";
            } finally {
                // Restore Button State
                translateBtn.disabled = false;
                translateBtn.innerHTML = `<i data-lucide="sparkles" class="w-5 h-5"></i> Translate Document`;
                lucide.createIcons();
            }
        });

        // Clipboard Controller
        copyBtn.addEventListener('click', () => {
            if (targetText.value) {
                navigator.clipboard.writeText(targetText.value);
                copyText.textContent = "Copied!";
                copyBtn.classList.add('text-emerald-600', 'bg-emerald-50');
                setTimeout(() => {
                    copyText.textContent = "Copy";
                    copyBtn.classList.remove('text-emerald-600', 'bg-emerald-50');
                }, 2000);
            }
        });

        // Advanced Web Speech Synthesis Wrapper
        function executionSpeech(text, locale) {
            if ('speechSynthesis' in window && text) {
                window.speechSynthesis.cancel(); // Stop active tracks
                const speechTrack = new SpeechSynthesisUtterance(text);
                speechTrack.lang = locale.split('-')[0]; 
                window.speechSynthesis.speak(speechTrack);
            } else {
                alert("Your browser does not support Audio Synthesis Engine.");
            }
        }

        speakSourceBtn.addEventListener('click', () => executionSpeech(sourceText.value, sourceLang.value));
        speakTargetBtn.addEventListener('click', () => executionSpeech(targetText.value, targetLang.value));
    </script>
</body>
</html>
